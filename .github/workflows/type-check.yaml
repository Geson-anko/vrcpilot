name: Type Check

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.pyi"
      - ".github/workflows/type_check.yaml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.pyi"
      - ".github/workflows/type_check.yaml"
      - "pyproject.toml"
      - "uv.lock"

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.7.20"

jobs:
  run_type-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      # inputtino-python is fetched from git on Linux and built natively
      # against libevdev. See https://github.com/games-on-whales/inputtino/tree/stable/bindings/python
      - name: Install inputtino build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config libevdev-dev

      - name: Check installed packages
        run: |
          echo "Python version:"
          uv run python -V
          echo "All installed packages:"
          uv pip list

      - name: Run pyright
        run: uv run pyright
